databases:
  - name: reachlytics-postgres
    databaseName: reachlytics
    user: reachlytics

services:
  - type: web
    name: reachlytics-api
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Reachlytics API
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reachlytics-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_MB
        value: "100"
      - key: ALLOWED_VIDEO_EXTENSIONS
        value: .mp4,.mov,.webm,.mkv
      - key: FRONTEND_ORIGINS
        value: https://reachlytics.vercel.app
      - key: AI_PROVIDER
        value: mock
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
